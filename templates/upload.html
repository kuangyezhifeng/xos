{% extends 'base.html' %}

{% block styles %}
    {{ super() }}
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <script src="/static/js/bootstrap.min.js"></script>
    <style>
        body {
            background: url("/static/images/wildlee.svg") no-repeat center;
            background-position: center 0;
            background-size: cover;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        .signin-container {
            background: linear-gradient(135deg, rgba(232, 86, 41, 0.85), rgba(255, 128, 64, 0.85));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            max-width: 520px;
            margin: 10% auto;
            padding: 30px 40px;
            border-radius: 16px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.3);
            color: white;
        }

        .form-control-file {
            color: black;
            background-color: white;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ddd;
            font-size: 14px;
            width: 100%;
        }

        .btn-custom {
            border-radius: 5px;
            font-weight: 600;
            background-color: #e85629;
            color: white;
            border: none;
            padding: 10px 20px;
            width: 48%;
            transition: background-color 0.3s ease;
        }

        .btn-custom:hover {
            background-color: #cc4a24;
            color: white;
        }

        .button-container {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 20px;
        }

        .upload-steps {
            list-style: none;
            padding-left: 0;
            margin-bottom: 20px;
        }

        .upload-steps li {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 15px;
            color: white;
        }

        .upload-steps i {
            margin-right: 10px;
            font-size: 18px;
            opacity: 0.9;
        }
    </style>
{% endblock %}

{% block content %}
    <div class="signin-container">
        <ul class="upload-steps">
            <li><i class="fas fa-upload"></i> 选择 Excel 文件上传</li>
            <li><i class="fas fa-table"></i> 自动解析表格数据</li>
            <li><i class="fas fa-circle-check"></i> 完成导入并跳转</li>
        </ul>

        <form class="form-horizontal" method="post" enctype="multipart/form-data" action="{{ url_for('import_excel_route', table_name=table_name) }}">
            <input type="file" name="file" class="form-control-file mb-3" accept=".xlsx">
            <input type="hidden" name="table_name" value="{{ table_name }}">
            <div class="button-container">
                <button type="submit" class="btn-custom">上传</button>
                <button type="button" onclick="window.location='{{ url_for('dashboard') }}'" class="btn-custom">返回</button>
            </div>
        </form>
    </div>
{% endblock %}
