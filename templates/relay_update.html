{% extends 'base.html' %}

{% block styles %}
    {{ super() }}
    <style>
        body {
            background: url(static/images/wildlee.svg) no-repeat center;
            background-position: center 0;
            background-size: cover;
            margin: 0px;
        }

        .signin-container {
            background-color: #e85629;
            opacity: 0.9;
            width: 480px;
            margin: 5% auto;
            padding: 30px;
            border-radius: 10px;
        }

        .form-control {
            border-radius: 5px;
            color: black;
            background-color: white;
        }

        /* 统一按钮风格，保持你之前的渐变风格 */
        .btn-custom {
            background-color: #e85629;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            font-weight: 600;
            transition: background-color 0.3s ease;
        }

        .btn-custom:hover {
            background-color: #cc4a24;
            color: white;
        }

        .button-container {
            display: flex;
            justify-content: space-between;
        }

        .col-form-label {
            text-align: left !important;
            color: white;
        }

        /* 表单间距微调 */
        .form-group {
            margin-bottom: 15px;
        }
    </style>
{% endblock %}

{% block content %}
    <div class="signin-container">
        {% for rule_info in relay_connections %}
            <form class="form-horizontal" method="post" action="{{ url_for('relay_update') }}">
                <input type="hidden" name="id" value="{{ rule_info.id }}">
                <div class="form-group row">
                    <label for="inputProtocol" class="col-sm-4 col-form-label">协议</label>
                    <div class="col-sm-12">
                        <select name="protocol" id="inputProtocol" class="form-control">
                            <option value="tcp" {% if rule_info.protocol == 'tcp' %}selected{% endif %}>tcp</option>
                            <option value="udp" {% if rule_info.protocol == 'udp' %}selected{% endif %}>udp</option>
                        </select>
                    </div>
                </div>

                <div class="form-group row">
                    <label for="inputSourcePort" class="col-sm-4 col-form-label">源端口</label>
                    <div class="col-sm-12">
                        <input type="number" name="source_port" class="form-control"
                               id="inputSourcePort"
                               value="{{ rule_info.source_port }}"
                               placeholder="源端口"
                               min="1024" max="65535"
                               required>
                    </div>
                </div>

                <div class="form-group row">
                    <label for="inputTargetIP" class="col-sm-4 col-form-label">目标IP</label>
                    <div class="col-sm-12">
                        <input type="text" name="target_ip" class="form-control"
                               id="inputTargetIP"
                               value="{{ rule_info.target_ip }}"
                               placeholder="目标IP"
                               pattern="^(25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)(\.(25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)){3}$"
                               title="请输入合法的 IPv4 地址，例如 192.168.0.1">
                    </div>
                </div>
                <div class="form-group row">
                    <label for="inputTargetPort" class="col-sm-4 col-form-label">目标端口</label>
                    <div class="col-sm-12">
                        <input type="number" name="target_port" class="form-control"
                               id="inputTargetPort"
                               value="{{ rule_info.target_port }}"
                               placeholder="目标端口"
                               min="1024" max="65535"
                               required>
                    </div>
                </div>
                <div class="form-group row">
                    <label for="inputNote" class="col-sm-4 col-form-label">备注</label>
                    <div class="col-sm-12">
                        <input type="text" name="note" class="form-control"
                               id="inputNote" value="{{ rule_info.note }}" placeholder="备注">
                    </div>
                </div>

                <div class="form-group" style="text-align: center;">
                    <label style="color: white;">注意: 端口和协议正确性, IP不可修改！</label>
                </div>

                <div class="button-container mt-4">
                    <button type="submit" class="btn-custom col-sm-4">更新规则</button>
                    <button type="button" onclick="window.location='{{ url_for('relay_connections') }}'"
                            class="btn-custom col-sm-4">返回
                    </button>
                </div>
            </form>
        {% endfor %}
    </div>
{% endblock %}
